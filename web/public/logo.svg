<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep rich sky-blue to slightly darker sky-blue -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </radialGradient>
    
    <!-- Accent Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.15" />
    </linearGradient>

    <!-- Play Button Gradient -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Styled Rounded Squircle Outer Shadow/Glow -->
  <rect x="36" y="36" width="440" height="440" rx="120" fill="#000000" opacity="0.25" filter="url(#glow)" />

  <!-- Main Squircle Background -->
  <rect x="36" y="36" width="440" height="440" rx="120" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="6" />

  <!-- Accent Inner Glow Circle (top-left light source) -->
  <rect x="42" y="42" width="428" height="428" rx="114" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.2" />

  <!-- Decorative Bezel Curved Line -->
  <path d="M120 400 C 200 415, 312 415, 392 400" fill="none" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round" opacity="0.25" />

  <!-- Centered Play Button Triangle with rounded corners -->
  <path d="M 215 175
           C 215 162, 230 154, 241 161
           L 345 226
           C 356 233, 356 249, 345 256
           L 241 321
           C 230 328, 215 320, 215 307
           Z" 
        fill="url(#playGrad)" 
        filter="drop-shadow(0px 8px 16px rgba(2, 132, 199, 0.45))" />

  <!-- Play Button Accent Sparkle -->
  <circle cx="340" cy="240" r="10" fill="#ffffff" opacity="0.8" filter="blur(1px)" />
</svg>
